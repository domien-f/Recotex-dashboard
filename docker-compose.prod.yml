version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: ${DB_PASSWORD:-recotex2026secure}
      POSTGRES_DB: analytics_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d analytics_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:80"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: 3001
      FRONTEND_URL: https://dashboard.recotex.be
      TEAMLEADER_CLIENT_ID: ${TEAMLEADER_CLIENT_ID}
      TEAMLEADER_CLIENT_SECRET: ${TEAMLEADER_CLIENT_SECRET}
      TEAMLEADER_REDIRECT_URI: https://dashboard.recotex.be/api/integrations/teamleader/callback
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      FACEBOOK_AD_ACCOUNT_ID: ${FACEBOOK_AD_ACCOUNT_ID}
      FACEBOOK_REDIRECT_URI: https://dashboard.recotex.be/api/integrations/meta/callback
      SOLVARI_EMAIL: ${SOLVARI_EMAIL}
      SOLVARI_PASSWORD: ${SOLVARI_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: https://dashboard.recotex.be/api/integrations/google/callback
      GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN}
      GOOGLE_ADS_MANAGER_ID: ${GOOGLE_ADS_MANAGER_ID}
      GOOGLE_ADS_CUSTOMER_ID: ${GOOGLE_ADS_CUSTOMER_ID}
    volumes:
      - uploads:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
